<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>ERPB — Under Maintenance</title>
<style>
  :root{
    --bg:        #f6f8fb;
    --bg-panel:  #ffffff;
    --line:      #eef1f6;
    --blue:      #3b5bfd;
    --blue-dim:  #dde3ff;
    --green:     #16a34a;
    --text:      #151b2c;
    --muted:     #6b7686;
    --mono:      'Share Tech Mono','Courier New',monospace;
    --sans:      'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    overflow:hidden;
  }

  /* faint grid backdrop, like a builder canvas */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:48px 48px;
    opacity:.7;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 75%);
    pointer-events:none;
  }

  .wrap{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:.72rem;
    letter-spacing:.28em;
    color:var(--blue);
    text-transform:uppercase;
    margin-bottom:28px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 0 0 rgba(59,91,253,.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(59,91,253,.55); }
    70%{ box-shadow:0 0 0 9px rgba(59,91,253,0); }
    100%{ box-shadow:0 0 0 0 rgba(59,91,253,0); }
  }

  /* ── signature element: interlocking gears assembling a block ── */
  .rig{
    width:220px; height:180px;
    margin-bottom:36px;
    position:relative;
  }
  .rig svg{ width:100%; height:100%; overflow:visible; }
  .gear{ transform-origin:center; }
  .gear.a{ animation:spin 9s linear infinite; }
  .gear.b{ animation:spin-rev 7s linear infinite; }
  .gear.c{ animation:spin 12s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  @keyframes spin-rev{ to{ transform:rotate(-360deg);} }

  h1{
    font-family:var(--mono);
    font-size:clamp(1.6rem, 4vw, 2.3rem);
    font-weight:700;
    letter-spacing:-.01em;
    margin:0 0 14px;
  }
  h1 span{ color:var(--blue); }

  p.lede{
    font-size:1rem;
    line-height:1.6;
    color:var(--muted);
    max-width:460px;
    margin:0 0 32px;
  }

  .status{
    font-family:var(--mono);
    font-size:.8rem;
    color:var(--text);
    background:var(--bg-panel);
    border:1px solid var(--line);
    box-shadow:0 4px 16px rgba(59,91,253,.06);
    border-radius:8px;
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:14px;
    min-width:300px;
  }
  .status .label{ color:var(--muted); }
  .status .val{ margin-left:auto; color:var(--blue); font-weight:600; }

  .bar{
    width:100%;
    height:3px;
    background:var(--blue-dim);
    border-radius:99px;
    margin-top:14px;
    overflow:hidden;
  }
  .bar i{
    display:block;
    height:100%;
    width:40%;
    background:var(--blue);
    border-radius:99px;
    animation:load 2.4s ease-in-out infinite;
  }
  @keyframes load{
    0%{ transform:translateX(-100%); }
    100%{ transform:translateX(350%); }
  }

  footer{
    position:absolute;
    bottom:22px;
    font-family:var(--mono);
    font-size:.7rem;
    color:var(--muted);
    letter-spacing:.05em;
  }

  @media (prefers-reduced-motion: reduce){
    .gear.a, .gear.b, .gear.c, .eyebrow .dot, .bar i{ animation:none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow"><span class="dot"></span>System Update in Progress</div>

  <div class="rig">
    <svg viewBox="0 0 220 180">
      <g class="gear a" fill="none" stroke="#3b5bfd" stroke-width="6">
        <circle cx="70" cy="70" r="34"/>
        <g stroke-width="6">
          <line x1="70" y1="22" x2="70" y2="36"/>
          <line x1="70" y1="104" x2="70" y2="118"/>
          <line x1="22" y1="70" x2="36" y2="70"/>
          <line x1="104" y1="70" x2="118" y2="70"/>
          <line x1="37" y1="37" x2="46" y2="46"/>
          <line x1="94" y1="94" x2="103" y2="103"/>
          <line x1="103" y1="37" x2="94" y2="46"/>
          <line x1="46" y1="94" x2="37" y2="103"/>
        </g>
        <circle cx="70" cy="70" r="10" fill="#f6f8fb"/>
      </g>

      <g class="gear b" fill="none" stroke="#151b2c" stroke-width="5" opacity="0.75" transform="translate(148,58)">
        <circle cx="0" cy="0" r="24"/>
        <g stroke-width="5">
          <line x1="0" y1="-34" x2="0" y2="-24"/>
          <line x1="0" y1="34" x2="0" y2="24"/>
          <line x1="-34" y1="0" x2="-24" y2="0"/>
          <line x1="34" y1="0" x2="24" y2="0"/>
          <line x1="-24" y1="-24" x2="-17" y2="-17"/>
          <line x1="24" y1="24" x2="17" y2="17"/>
          <line x1="24" y1="-24" x2="17" y2="-17"/>
          <line x1="-24" y1="24" x2="-17" y2="17"/>
        </g>
        <circle cx="0" cy="0" r="7" fill="#f6f8fb"/>
      </g>

      <g class="gear c" fill="none" stroke="#6b7686" stroke-width="4" opacity="0.6" transform="translate(105,138)">
        <circle cx="0" cy="0" r="18"/>
        <g stroke-width="4">
          <line x1="0" y1="-26" x2="0" y2="-18"/>
          <line x1="0" y1="26" x2="0" y2="18"/>
          <line x1="-26" y1="0" x2="-18" y2="0"/>
          <line x1="26" y1="0" x2="18" y2="0"/>
        </g>
        <circle cx="0" cy="0" r="5" fill="#f6f8fb"/>
      </g>
    </svg>
  </div>

  <h1>We're tightening a few <span>bolts</span>.</h1>
  <p class="lede">
    ERPB is offline for a scheduled update. Sales logs, requests, and approvals are safe —
    the system will pick back up right where it left off.
  </p>

  <div class="status">
    <span class="label">status</span>
    <span class="val" id="status-val">updating</span>
  </div>
  <div class="bar" style="width:300px;"><i></i></div>
</div>

<footer>ERPB · Enterprise Resource Planning Builder</footer>

</body>
</html>
